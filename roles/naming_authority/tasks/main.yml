---
- name: Normalize environ (handle list vs string)
  set_fact:
    environment: "{{ (environ | first) if environ is iterable and environ is not string else environ }}"

- name: Debug environment
  debug:
    msg: "Raw environ={{ environ }} | Normalized={{ environment }}"

- name: Fail if missing
  fail:
    msg: "environ variable is missing from AWX"
  when: environment is not defined or environment == ""

- name: Validate environment value
  fail:
    msg: "Invalid environ value: {{ environment }}"
  when: environment not in env_map

- name: Set environment code
  set_fact:
    env_code: "{{ env_map[environment] }}"

- name: Set hostname (temporary test)
  set_fact:
    hostname: "TEST-{{ env_code }}-01"
