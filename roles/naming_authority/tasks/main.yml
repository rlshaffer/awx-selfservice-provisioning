---
- name: Show all variables
  debug:
    var: vars

- name: FAIL FAST if environment is missing
  fail:
    msg: "environment variable is NOT being passed from AWX"
  when: environment is not defined

- name: Show environment value
  debug:
    var: environment

- name: Set environment code
  set_fact:
    env_code: "{{ env_map[environment] }}"