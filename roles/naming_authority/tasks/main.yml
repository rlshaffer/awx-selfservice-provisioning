---
- name: Validate environment value
  fail:
    msg: "Invalid environ value: {{ environ }}"
  when: environ not in ['dev', 'qa', 'uat', 'prod']

- name: Normalize environ (simple + reliable)
  set_fact:
    env_value: "{{ ((environ | first) if environ is iterable and environ is not string else environ) | trim }}"

- name: Set environment code
  set_fact:
    env_code: "{{ environ | lower }}"

- name: Debug environment
  debug:
    msg: "Raw={{ environ }} | Normalized={{ env_value }}"

- name: Fail if missing
  fail:
    msg: "environ variable is missing"
  when: env_value is not defined or env_value == ""

- name: Set hostname (temporary)
  set_fact:
    hostname: "TEST-{{ env_code }}-01"
