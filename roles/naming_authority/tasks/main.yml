---
- name: Show all variables
  debug:
    var: vars

- name: FAIL FAST if enviro is missing
  fail:
    msg: "enviro variable is NOT being passed from AWX"
  when: enviro is not defined

- name: Show enviro value
  debug:
    var: environ

- name: Set environ code
  set_fact:
    env_code: "{{ env_map[enviro] }}"