---
- name: Create VM
  community.vmware.vmware_guest:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_pass }}"
    validate_certs: no

    datacenter: 'LAB Datacenter'
    cluster: 'LAB Cluster'

    folder: LABVMW_DATASTORE\"{{ hostname }}"   # ✅ ADD THIS LINE

    name: "{{ hostname }}"
    template: win-template

    hardware:
      num_cpus: "{{ cpu }}"
      memory_mb: "{{ memory * 1024 }}"

    disk:
      - size_gb: "{{ disk_size }}"

    state: poweredon