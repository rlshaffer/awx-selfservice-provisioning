- name: Set vm_name from hostname
  set_fact:
    vm_name: "TestAWXVM" #"{{ hostname }}"

- name: Normalize env_key key   ✅ MUST COME BEFORE DEBUG
  set_fact:
    env_key: "{{ environ | lower }}"

- name: Show VMware collection version
  shell: ansible-galaxy collection list | grep vmware
  register: vmware_collections

- debug:
    var: vmware_collections.stdout

- name: DEBUG environments structure
  debug:
    var: environments   

- name: Apply environ config
  set_fact:
    datacenter: "{{ environments[env_key].datacenter }}"
    cluster: "{{ environments[env_key].cluster }}"
    datastore: "{{ environments[env_key].datastore }}"
    network: "{{ environments[env_key].network }}"
    folder: "{{ environments[env_key].folder }}"
    disk_size: "{{ environments[env_key].disk }}"
    memory: "{{ environments[env_key].memory }}"
    cpu: "{{ environments[env_key].cpu }}"
    
- name: DEBUG final VM config
  debug:
    msg:
      hostname: "{{ vcenter_hostname }}"
      datacenter: "{{ datacenter }}"
      cluster: "{{ cluster }}"
      datastore: "{{ datastore }}"
      name: "{{ vm_name }}"
      folder: "{{ folder }}"
      network: "{{ network }}"
      disk_size: "{{ disk_size }}"
      memory: "{{ memory }}"
      cpu: "{{ cpu }}"

- name: Create VM (minimal test)
  vmware_guest:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    validate_certs: false

    name: "{{ vm_name }}"
    #template: "win-template"
    datacenter: "{{ datacenter }}"
    cluster: "{{ cluster }}"
    datastore: "{{ datastore }}"
    folder: "{{ folder }}"

    guest_id: windows9Server64Guest

    hardware:
      memory_mb: "{{ memory }}"
      num_cpus: "{{ cpu }}"

    disk:
      - size_gb: "{{ disk_size }}"
        type: thin
        datastore: "{{ datastore }}"

    networks:
      - name: "{{ network }}"

    state: poweredon



    
