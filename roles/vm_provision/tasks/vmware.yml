- name: Set vm_name from hostname
  set_fact:
    vm_name: "{{ hostname }}"

- name: DEBUG env_key
  debug:
    var: env_key

- name: Normalize environment key
  set_fact:
    env_key: "{{ environ | lower }}"

- name: Apply environ config
  set_fact:
    datacenter: "{{ environments[env_key].datacenter }}"
    cluster: "{{ environments[env_key.cluster }}"
    datastore: "{{ environments[env_key].datastore }}"
    network: "{{ environments[env_key].network }}"
    folder: "{{ environments[env_key].folder }}"
    disk_size: "{{ environments[env_key].disk }}"
    memory: "{{ environments[env_key].memory }}"
    cpu: "{{ environments[env_key].cpu }}"

- name: Validate environment key exists
  fail:
    msg: "Environ '{{ env_key }}' not found in environments config"
  when:
    - env_key is not defined
    - environments[env_key] is not defined