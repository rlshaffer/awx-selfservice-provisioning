- name: Set vm_name from hostname
  set_fact:
    vm_name: "TestAWXVM" #"{{ hostname }}"

- name: Normalize env_key key   ✅ MUST COME BEFORE DEBUG
  set_fact:
    env_key: "{{ environ | lower }}"

- name: Apply environ config
  set_fact:
    datacenter: "{{ environments[env_key].datacenter }}"
    cluster: "{{ environments[env_key].cluster }}"
    datastore: "{{ environments[env_key].datastore }}"
    network: "{{ environments[env_key].network }}"
    folder: "{{ environments[env_key].folder }}"
    disk_size: "{{ environments[env_key].disk }}"
    memory: "{{ environments[env_key].memory }}"
    cpu: "{{ environments[env_key].cpu }}"

- name: DEBUG final VM config
  debug:
    msg:
      hostname: "{{ vcenter_hostname }}"
      datacenter: "{{ datacenter }}"
      cluster: "{{ cluster }}"
      datastore: "{{ datastore }}"
      name: "{{ vm_name }}"
      folder: "{{ folder }}"
      network: "{{ network }}"
      disk_size: "{{ disk_size }}"
      memory: "{{ memory }}"
      cpu: "{{ cpu }}"


- name: Create VM (minimal test)
  vmware_guest:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    validate_certs: no
    name: "{{ vm_name }}"
    datacenter: "{{ datacenter }}"
    cluster: "{{ cluster }}"
    datastore: "{{ datastore }}"
    folder: "{{ folder }}"
    networks:
    - name: "{{ network }}"
    disk_size: "{{ disk_size }}"
    memory: "{{ memory }}"
    cpu: "{{ cpu }}"
    state: poweredon


    
