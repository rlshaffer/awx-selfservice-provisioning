- name: Set vm_name from hostname
  set_fact:
    vm_name: "{{ hostname }}"

- name: DEBUG env_key
  debug:
    var: env_key
    
- name: DEBUG env variables
  debug:
    msg:
      - "environ={{ environ | default('UNDEFINED') }}"
      - "normalized_env={{ normalized_env | default('UNDEFINED') }}"

- name: Apply environ config
  set_fact:
    datacenter: "{{ environments[normalized_env].datacenter }}"
    cluster: "{{ environments[normalized_env].cluster }}"
    datastore: "{{ environments[normalized_env].datastore }}"
    network: "{{ environments[normalized_env].network }}"
    folder: "{{ environments[normalized_env].folder }}"
    disk_size: "{{ environments[normalized_env].disk }}"
    memory: "{{ environments[normalized_env].memory }}"
    cpu: "{{ environments[normalized_env].cpu }}"

- name: Validate environment key exists
  fail:
    msg: "Environ '{{ env_key }}' not found in environments config"
  when:
    - env_key is not defined
    - environments[env_key] is not defined