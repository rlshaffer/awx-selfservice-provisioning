- name: Debug input variables
  debug:
    msg:
      memory: "{{ memory | default('UNDEFINED') }}"
      cpu: "{{ cpu | default('UNDEFINED') }}"
      disk_size: "{{ disk_size | default('UNDEFINED') }}"

- name: Dump ALL vars used in VM creation
  debug:
    msg:
      hostname: "{{ hostname | default('UNDEFINED') }}"
      memory: "{{ memory | default('UNDEFINED') }}"
      cpu: "{{ cpu | default('UNDEFINED') }}"
      disk_size: "{{ disk_size | default('UNDEFINED') }}"

- name: Create VM from ISO
  community.vmware.vmware_guest:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_pass }}"
    validate_certs: no

    datacenter: "LAB Datacenter"

    # ✅ USE EITHER CLUSTER OR ESXI HOST (this is safer)
    cluster: "LAB Cluster"
    resource_pool: "Resources"

    folder: "/LAB Datacenter/vm"

    name: "{{ hostname }}"
    guest_id: windows9Server64Guest

    state: poweredon

    hardware:
      memory_mb: 4096
      num_cpus: 2
      scsi: paravirtual
      hotadd_cpu: false
      hotadd_memory: false

    disk:
      - size_gb: 60
        type: thin
        datastore: "LABVMW_DATASTORE"
        controller_type: paravirtual
        controller_number: 0
        unit_number: 0

    cdrom:
      - type: iso
        iso_path: "[Iso Data Store] vmware_iso/Windows10.iso"

    networks:
      - name: "LABServerPortGroup"