---
- name: Validate required inputs
  fail:
    msg: "cpu={{ cpu | default('MISSING') }}, memory={{ memory | default('MISSING') }}, disk_size={{ disk_size | default('MISSING') }}"
  when:
    - cpu is not defined or cpu | string == ""
    - memory is not defined or memory | string == ""
    - disk_size is not defined or disk_size | string == ""

- name: Debug inputs
  debug:
    msg:
      - "CPU={{ cpu }}"
      - "Memory={{ memory }}"
      - "Disk={{ disk_size }}"    
      
- name: Debug input values
  debug:
    msg:
      - "CPU: {{ cpu | default('MISSING') }}"
      - "Memory: {{ memory | default('MISSING') }}"
      - "Disk: {{ disk_size | default('MISSING') }}"

- name: Create VM from ISO
  community.vmware.vmware_guest:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_pass }}"
    validate_certs: no

    datacenter: "LAB Datacenter"
    cluster: "LAB Cluster"
    folder: "/LAB Datacenter/vm"
    datastore: "LABVMW_DATASTORE"

    name: "{{ hostname }}"
    guest_id: windowsGuest   # ✅ choose appropriate OS

    state: poweredon

    hardware:
      num_cpus: "{{ cpu }}"
      memory_mb: "{{ memory * 1024 }}"
      boot_firmware: bios

    disk:
      - size_gb: "{{ disk_size }}"
        type: thin
    

    cdrom:
      - type: iso
        iso_path: "[Iso Data Store] vmware_iso/Windows10.iso"

    networks:
      - name: "LABServerPortGroup"
        start_connected: true
        type: dhcp

  
