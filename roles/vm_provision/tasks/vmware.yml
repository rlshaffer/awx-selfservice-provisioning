- name: Set vm_name from hostname
  set_fact:
    vm_name: "{{ hostname }}"

- name: Apply environment config
  set_fact:
    datacenter: "{{ environments[environment].datacenter }}"
    cluster: "{{ environments[environment].cluster }}"
    datastore: "{{ environments[environment].datastore }}"
    network: "{{ environments[environment].network }}"
    folder: "{{ environments[environment].folder }}"
    disk_size: "{{ environments[environment].disk }}"
    memory: "{{ environments[environment].memory }}"
    cpu: "{{ environments[environment].cpu }}"