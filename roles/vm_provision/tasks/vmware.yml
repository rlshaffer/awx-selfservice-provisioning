- name: Load environment config
  set_fact:
    vm_config: "{{ environments[env_code] }}"

- name: Test DNS resolution
  command: getent hosts {{ hostname }}
  register: dns_test
  ignore_errors: y

- debug:
    var: dns_test.stdout

- name: DEBUG full vm config
  debug:
    msg:
      datacenter: "{{ datacenter | default('NOT SET') }}"
      datastore: "{{ datastore | default('NOT SET') }}"
      cluster: "{{ cluster | default('NOT SET') }}"
      folder: "{{ folder | default('NOT SET') }}"
      network: "{{ network_name | default('NOT SET') }}"
      cpu: "{{ cpu | default('NOT SET') }}"
      memory: "{{ memory | default('NOT SET') }}"
      disk: "{{ disk_size | default('NOT SET') }}"

- name: Create VM (minimal test)
  community.vmware.vmware_guest:
    hostname: "{{ lookup('env','VMWARE_HOST') }}"
    username: "{{ lookup('env','VMWARE_USER') }}"
    password: "{{ lookup('env','VMWARE_PASSWORD') }}"
    validate_certs: no

    datacenter: "{{ vm_config.datacenter }}"
    cluster: "{{ vm_config.cluster }}"
    datastore: "{{ vm_config.datastore }}"
    network: "{{ vm_config.network }}"
    folder: "{{ vm_config.folder }}"

    name: "{{ hostname }}"
    state: present

    guest_id: windows9Server64Guest

    disk:
      - size_gb: "{{ disk_size | int }}"
        datastore: "{{ datastore }}"

    hardware:
      memory_mb: "{{ memory | int * 1024 }}"
      num_cpus: "{{ cpu | int }}"

    networks:
      - name: "{{ network_name }}"
        device_type: vmxnet3
        type: dhcp

        - name: Debug vm_config
- name: Debug vm_config
  debug:
    var: vm_config

